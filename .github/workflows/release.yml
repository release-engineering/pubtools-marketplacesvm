name: Release on PyPI

on:
  push:
    tags:
    - v*

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.10'
    - run: pip install build
    - run: python -m build
    - uses: pypa/gh-action-pypi-publish@release/v1
